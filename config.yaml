# Live Coverage Bot Configuration
# Copy this file to config.yaml and fill in your values.

# Polling interval for checking live events (seconds)
polling_interval_seconds: 30

# Competition IDs to monitor (from BetPawa/SportyBet responses)
# These filter which leagues trigger notifications
priority_leagues:
  - "12345"  # Example: Premier League
  - "67890"  # Example: La Liga

# SportyBet API configuration
sportybet:
  base_url: "https://www.sportybet.com/api/ng/factsCenter"

# BetPawa API configuration
# Headers (brand, language, device_type) are set automatically
betpawa:
  base_url: "https://www.betpawa.ng/api/sportsbook/v3"
  brand: "betpawa-nigeria"
  language: "en"
  device_type: "web"

# Slack webhook configuration (REQUIRED)
# Create an incoming webhook at https://api.slack.com/messaging/webhooks
slack:
  webhook_url: "https://webhook.site/3c770935-bda3-4d30-854b-b35c96530e1e"
